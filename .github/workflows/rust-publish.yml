# Publish Rust crates to crates.io
#
# 把 czsc Rust workspace 的可复用 crate 发布到 crates.io，让纯 Rust 用户
# 也能 `cargo add czsc-core` / `czsc-signals` / `czsc-trader` 等。
#
# 发布顺序按依赖图严格分层（同层并行不安全：crates.io index 同步有延迟，
# 后发的 crate `cargo publish` 时上一层可能还没 index 到）：
#
#   layer 0: czsc-derive / czsc-signal-macros
#   layer 1: czsc-core    （依赖 czsc-derive，并内置 error_chain 模块，
#                            原 error-support 已合并进来）
#   layer 2: czsc-ta / czsc-utils
#   layer 3: czsc-signals
#   layer 4: czsc-trader
#   layer 5: czsc         （facade crate，re-export 上面 5 个业务 crate）
#
# 注：原 `error-support` crate 已合并到 czsc-core::error_chain；
#     原 `error-macros` 重命名为 `czsc-derive`（保留独立 crate，因为
#     proc-macro 必须独立，cargo 限制）。
#
# czsc-python **不发布**：
#   - 它是 cdylib，靠 maturin 打成 wheel 给 Python 用，crates.io 上无意义
#   - 它启用了 pyo3/extension-module，cargo publish 校验会拒绝
#
# 单一版本源仍是 Cargo.toml [workspace.package].version，与 Python wheel
# 共享 tag。`cargo publish --workspace` 会自动按声明拓扑串行发布；显式
# 列出顺序只是为了给"上一层 index 同步未完"留出 retry 空间。
#
# 触发：
#   - push tag v* 时自动跑 dry-run（不真正上传），用来验证发布流程
#   - workflow_dispatch 时由维护者勾选 do_publish 才真正发布
#
# 凭证：CRATES_IO_TOKEN（repo secret）。crates.io 目前还不支持 OIDC
# Trusted Publishing；等 RFC 落地后改 OIDC。

name: Publish Rust crates

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      do_publish:
        description: 'Actually publish to crates.io (false = dry-run only)'
        required: false
        default: false
        type: boolean
      start_layer:
        description: 'Resume from this layer onward (0..5). Use when previous run was interrupted by rate-limit / network. Set to 3 to skip layers 0/1/2 (already published).'
        required: false
        default: '0'
        type: choice
        options: ['0', '1', '2', '3', '4', '5']
      end_layer:
        description: 'Stop after this layer (0..5). crates.io rate-limits new-crate creates to ~1 per 10 min, so each new crate may need its own run. Default 5 = run to the end.'
        required: false
        default: '5'
        type: choice
        options: ['0', '1', '2', '3', '4', '5']

concurrency:
  group: rust-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # tag push → 默认只 dry-run；workflow_dispatch 才能真正发布。
    # 通过环境变量 PUBLISH_FOR_REAL 控制 cargo publish 是否带 --dry-run。
    env:
      PUBLISH_FOR_REAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.do_publish == 'true' }}
      # 断点续发支持：start_layer 默认 '0'，遇到 crates.io rate-limit 或者
      # 网络中断时，再次 workflow_dispatch 时把它设到失败的 layer，跳过前
      # 面已发的 layer 即可。每个 layer step 用 fromJSON(START_LAYER) <= N
      # 比较。tag push 触发时 START_LAYER 取默认 '0'。
      START_LAYER: ${{ github.event.inputs.start_layer || '0' }}
      END_LAYER:   ${{ github.event.inputs.end_layer   || '5' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify version consistency (Cargo.toml vs git tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # 用 awk -F'"' 切分字段（POSIX 兼容；gawk gsub 不支持 \\1 backreference，所以避免用它）
          CARGO_VERSION=$(awk -F'"' '
            /^\[workspace\.package\]/ {in_section=1; next}
            in_section && /^\[/ {in_section=0}
            in_section && /^version[[:space:]]*=/ {print $2; exit}
          ' Cargo.toml)
          echo "Tag version:        $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION 与 Cargo.toml 版本 $CARGO_VERSION 不一致"
            exit 1
          fi

      # 先做一次完整 build，确保 workspace 整体可编译；
      # publish-time 失败比发了一半再回滚代价高得多。
      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: Login to crates.io
        if: env.PUBLISH_FOR_REAL == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::Missing CRATES_IO_TOKEN secret"
            exit 1
          fi
          # CARGO_REGISTRY_TOKEN 已通过 env 注入，cargo publish 会自动读取

      # ------------------------------------------------------------------
      # dry-run 模式：用 `cargo publish --workspace --dry-run` 统一处理
      #
      # cargo 1.84+ 的 --workspace 会自动按依赖拓扑遍历所有 workspace 成员
      # （publish = false 的 czsc-python 自动跳过），且 dry-run 时跨 workspace
      # 解析 path 依赖、不查 crates.io 索引 —— 完美避开「上一层未真发、下
      # 一层找不到依赖」的 catch-22。
      #
      # 之所以不在 real 模式也用 --workspace：
      #   1. cargo 不在每个 publish 之间等 crates.io index 同步，串行真发
      #      时上一层刚 push 完、下一层立刻 publish 会偶发 404
      #   2. 失败时回滚不便（已上传的 crate 只能 yank）
      #   3. real 走分层 + sleep 30s 的传统方式更稳
      # ------------------------------------------------------------------
      - name: Dry-run (publish --workspace --dry-run)
        if: env.PUBLISH_FOR_REAL != 'true'
        shell: bash
        run: |
          echo "::notice::Running cargo publish --workspace --dry-run (no real upload)"
          cargo publish --workspace --dry-run --no-verify --allow-dirty

      # ------------------------------------------------------------------
      # real 模式：按依赖图分层串行 publish。每层之间 sleep 30s 让 crates.io
      # index 同步完成，否则下一层 cargo publish 解析 version 时可能找不到
      # 刚发的 crate（404）。
      # ------------------------------------------------------------------
      - name: Real publish layer 0 (czsc-derive, czsc-signal-macros)
        if: env.PUBLISH_FOR_REAL == 'true' && fromJSON(env.START_LAYER) <= 0 && fromJSON(env.END_LAYER) >= 0
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          for c in czsc-derive czsc-signal-macros; do
            echo "::group::publish $c"
            cargo publish -p "$c" --no-verify
            echo "::endgroup::"
          done
          sleep 30

      - name: Real publish layer 1 (czsc-core)
        if: env.PUBLISH_FOR_REAL == 'true' && fromJSON(env.START_LAYER) <= 1 && fromJSON(env.END_LAYER) >= 1
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          cargo publish -p czsc-core --no-verify
          sleep 30

      - name: Real publish layer 2 (czsc-ta, czsc-utils)
        if: env.PUBLISH_FOR_REAL == 'true' && fromJSON(env.START_LAYER) <= 2 && fromJSON(env.END_LAYER) >= 2
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          for c in czsc-ta czsc-utils; do
            echo "::group::publish $c"
            cargo publish -p "$c" --no-verify
            echo "::endgroup::"
          done
          sleep 30

      - name: Real publish layer 3 (czsc-signals)
        if: env.PUBLISH_FOR_REAL == 'true' && fromJSON(env.START_LAYER) <= 3 && fromJSON(env.END_LAYER) >= 3
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          cargo publish -p czsc-signals --no-verify
          sleep 30

      - name: Real publish layer 4 (czsc-trader)
        if: env.PUBLISH_FOR_REAL == 'true' && fromJSON(env.START_LAYER) <= 4 && fromJSON(env.END_LAYER) >= 4
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          cargo publish -p czsc-trader --no-verify
          sleep 30

      - name: Real publish layer 5 (czsc facade)
        if: env.PUBLISH_FOR_REAL == 'true' && fromJSON(env.START_LAYER) <= 5 && fromJSON(env.END_LAYER) >= 5
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -e
          cargo publish -p czsc --no-verify

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [ "$PUBLISH_FOR_REAL" == "true" ]; then
            echo "✅ Published czsc Rust crates v$(awk '/^\[workspace\.package\]/{f=1;next} f&&/^version/{gsub(/.*"([^"]+)".*/,"\\1");print;exit}' Cargo.toml) to crates.io"
          else
            echo "🟡 Dry-run completed; nothing was published. Trigger workflow_dispatch with do_publish=true to release for real."
          fi
